<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>상품 리뷰</h1>

    <div class="product-image">
        <img src="https://picsum.photos/600/400">
    </div>
    
    <!-- 리뷰 작성 폼 -->
    <section class="review-form">
        <h2>리뷰를 작성해주세요.</h2>
        <div>
            <p>평점: </p>
            <label><input type="radio" name="rating" value="1">1</label>
            <label><input type="radio" name="rating" value="2">2</label>
            <label><input type="radio" name="rating" value="3">3</label>
            <label><input type="radio" name="rating" value="4">4</label>
            <label><input type="radio" name="rating" value="5">5</label>
        </div>
        <textarea id="comment" placeholder="후기를 작성해주세요." rows="5" cols="40"></textarea>
        <button id="send">제출</button>

        <!-- 리뷰 영역 -->
        <section>
            <h2>리뷰</h2>
            <div id="review-container">
                <div class="ai-summary">
                    <p><strong>AI 요약:</strong>현재는 리뷰가 없습니다.</p>
                    <p><strong>평균 별점:</strong>N/A</p>
                </div>
            </div>
        </section>
    </section>
    <script>
        document.getElementById('send').addEventListener('click', async () => {
            const comment = document.getElementById('comment').value;
            console.log(comment)
            const ratings = document.getElementsByName('rating');
            let rating = 0;
            for(let rate of ratings) {
                if (rate.checked) {
                    rating = rate.value;
                    break
                }
            };
            console.log(rating)
            
            await fetch('/api/reviews', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({rating, comment})
            });
            
            const reviewDisplay = document.getElementById('review-container');
            const review = document.createElement('div');
            review.innerHTML = `<strong>Rating: ${rating}</strong><br><p>${comment}</p>`;
            reviewDisplay.appendChild(review);

            const aiDisplay = document.querySelector('.ai-summary');
            data = await fetch('/api/ai-summary')
            ai_result = await data.json()
            console.log(ai_result)

            aiDisplay.innerHTML = `<p><strong>AI 요약:</strong>${ai_result.ai_summary}</p>
                            <p><strong>평균 별점:</strong>${ai_result.avg_rating}</p>`





        });




    </script>
</body>
</html>
