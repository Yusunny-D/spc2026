<html>
    <head>
        <title>포토 캘린더</title>
        <style>
            h1, h2 {
                text-align: center;
            }

            #calender{
                width: 100%;
                border-collapse: collapse;
                /* border: 1px solid black; */
            }
            
            /* #calender th:first-child, #calender td:first-child */
            /* calender id를 가지고 그 아래에 있는 모든 th, tb의 첫번째 */
            #calender tr > *:first-child { 
                color: red;
            }

            #calender th:last-child,
            #calender td:last-child {
                color: blue;
            }
            
            #calender th { /* #calender th: calender 밑에 있는 모든 th*/
                           /* #calender > th: calender 바로 밑에 있는 th*/
                width: 14%;
                padding: 10px;
                background-color: rgb(238, 238, 238);
            }

            #calender td {
                text-align: center;
                padding: 10px;
                border: 1px solid black;
            }

            img {
                width: 100%;
            }

        </style>
    </head>
    <body>
        <h1>포토 캘린더</h1>
        <h2>2026년 4월</h2>
        <img src="images\sea.jpg">
        <table id="calender">
            <tr>
                <th>Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
                <td>11</td>
            </tr>
            <tr>
                <td>12</td>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
                <td>18</td>
            </tr>
            <tr>
                <td>19</td>

        </table>
    </body>
</html>
