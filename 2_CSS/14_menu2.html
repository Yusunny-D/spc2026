<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            /* width: 100px; */
            display: flex;
            border: 1px solid #555;
        }
        li {
            flex: 1; /* flex 영영을 꽉 채우기*/
            width: 100px;
            text-align: center;

        }
        li a {
            display: block; /* 전체 영역을 꽉 채우기*/
            text-decoration: none;
        }
        li a:hover {
            background-color: #555;
            color: white;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">News</a></li>
        <li><a href="#">Content</a></li>
        <li><a href="#">About</a></li>
    </ul>
</body>
</html>
