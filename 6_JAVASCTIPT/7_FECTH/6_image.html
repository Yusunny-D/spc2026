<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<button id="photo">사진 가져오기</button>
<body>
    <!-- 1. 버튼을 클릭하면, 이미지를 화면에 출력한다 -->
    <!-- 요청해야할 주소는 dog.ceo에 방문해서 random 강아지 사진 받아오는 스펙 찾아서 가져온다 -->
    <div id="result"><!-- 응답 데이터를 표시할 곳 --></div>
<script>
        // GET으로 정보 요청(달라는 요청)
        document.getElementById('photo').addEventListener('click', () => {
            fetch(`https://dog.ceo/api/breeds/image/random`)
            .then((response) => response.json())
            .then((data) => {
                // if (data.status => {})
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                <img src=${data['message']} width=400px>
                `;
                console.log(data.status);
            })
            .catch((error) => {
                console.error('위에 fetch를 자리 처리하고 가공하는 과정 어딘가에서 오류가 났습니다.', error)
                // displayError(data)
                
            });
        // function displayError(data) {
        //     console.log('화면에 DOM 그리기를 실패했습니다.', )
        // }

        })
</script>
</body>
</html>
