<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"><!-- 응답 대이터를 표시할 곳 --></div>
    <script>
        document.getElementById('loadBtn').addEventListener('click', () => {
            // console.log('버튼 클릭됨')
            fetch('http://jsonplaceholder.typicode.com/todos/1').then((response) => {
                if (!response.ol) {
                    console.log('응답은 왔으나, OK가 아님 ', response)
                    throw new Error('알수 없는 오류가 발생했습니다.')
                }
               
            console.log('성공적인 응답이 왔음. 응답은 여기 담겨있음: '. response)
            return response.json();
            }).then((data) => {
                console.log('최종 피싱이 끝난 json 자료구조가 넘어옴: ', data)
            }).catch((error) => {
                console.log('위에 fetch를 자리 처리하고 가공하는 과정 어딘가에서 오류가 났습니다.')
            })

        })
    </script>
</body>
</html>
