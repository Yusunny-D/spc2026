<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <input type="number" id="uid">
    <button id="loadBtn">데이터 요청</button>
    <button id="saveBtn">데이터 쓰기</button>
    <button id="deleteBtn">데이터 삭제</button>
    <button id="modeBtn">데이터 수정</button>
    <div id="result"><!-- 응답 대이터를 표시할 곳 --></div>
    <script>
        // fetch와 then이 왜 나오는가?

        // 파이썬은 한줄씩 차례대로 읽어서 코드를 진행(동기 방식)
        // 하지만 JS는 다름. 왜냐? 비동기 방식이기 때문이다...

        // JS의 기본: "일단 요청 보내놓고 다음 코드 먼저 실행할게~" -JS
        // (차례대로 쓰여 있어도 차례대로 실행 안됨)

        // fetch는 서버 응답이 와야 결과를 줄 수 있어서 기다려야함 
        // "나중에 결과 줄게~" - fetch (fetch는 Promise 객체를 반환함)

        // 그래서.. fetch의 결과를 가져왔을 때
        // 그 다음을 실행하라 하는 애가 바로! .then(함수)이다..

        // 아래 예제 코드에서 .then()에 익명 함수가 들어가는데 그 안에 인자가 들어있음.. 
        // 문제는 아무 곳에서도 인자 혹은 변수에 뭘 정의하지 않았는데 코드가 돌아감

        // 그 이유는
        // fetch().then((인자) => {}) 이렇게 써지면 앞의 fetch의 결과를 바로 함수의 인자로 받게되기 때문
        // 그렇지만 then(함수) 이 함수 안에서 받은 인자이기에 밖에서는 부를 수 없음
        // 그래서 연쇄 .then().then()이 생기는 이유임 (이러면 계속 앞의 결과를 인자로 받기 때문)

        // .catch()는 fetch나 then(Promise 체인) 처리 중 오류가 나면 실행된다.

        // 새로 보이는 매서드
        // response.json(): fetch 결과물 객체 안의 body의 JSON 문자열을 JS 객체로 파싱(parse)하는 것 (일반 JSON 문자열에서는 못 씀)
        // JSON.stringify(obj): JS 객체 → JSON 문자열 (이거의 반대는 JSON.parse(text))

        // PUT 정보 요청(수정) (이해를 돕기 위해서 SQL로 따지면 UPDATE WHERE문)
        document.getElementById('modeBtn').addEventListener('click', () =>{
            const userid = document.getElementById('uid').value;
            console.log("수정할 ID: ", userid)
            const putData = {
                title: 'h',
                body: 'w',
                userid: userid,
                id: userid
            }
            fetch(`https://jsonplaceholder.typicode.com/posts/${userid}`, {
                method: 'PUT',
                headers: {
                'Content-type': 'application/json; charser=utf-8'
            },
            body: JSON.stringify(putData)
        })
            .then(resp => resp.json())
            .then(data => console.log(data))
        })

        // DElETE 정보 요청(삭제)
        document.getElementById('deleteBtn').addEventListener('click', () =>{
            const userid = document.getElementById('uid').value;
            fetch(`https://jsonplaceholder.typicode.com/posts/${userid}`, {
                method: 'DELETE'
            })
        })

        // POST 정보 요청(업데이트) (이해를 돕기 위해서 SQL로 따지면 insert 생성문)
        document.getElementById('saveBtn').addEventListener('click', () =>{
            const postData = {
                title: 'h',
                body: 'w',
                userid: 1
            }
            
        // 이 주소는 원작자의 문서를 통해서 확인
        fetch('https://jsonplaceholder.typicode.com/posts', {
            method: 'POST',
            headers: {
                'Content-type': 'application/json; charser=utf-8'
            },
            body: JSON.stringify(postData)
        })
            .then(resp => resp.json())
            .then(data => console.log(data))
        });

        // GET으로 정보 요청(달라는 요청)
        document.getElementById('loadBtn').addEventListener('click', () => {
            const userid = document.getElementById('uid').value;
            fetch(`http://jsonplaceholder.typicode.com/users/${userid}`)
            .then((response) => response.json())
            .then((data) => {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                <ul>
                    <li>사용자ID: ${data.id}</li>
                    <ul>
                        <li>이름: ${data.name}</li>
                        <li>전화번호: ${data.phone}</li>
                        <li>웹사이트: ${data.website}</li>
                    </ul>
                </ul>
                `;
            })
            .catch((error) => {
                console.log('위에 fetch를 자리 처리하고 가공하는 과정 어딘가에서 오류가 났습니다.', error)
            })
        });
    </script>
</body>
</html>
