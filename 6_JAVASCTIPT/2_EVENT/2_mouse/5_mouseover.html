<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mybutton {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="mybutton">마우스를 올려보세요</div>
    <script>
        document.getElementById('mybutton').addEventListener('mouseover', () => {
            console.log('마우스가 올라갔어요')
        })
        document.getElementById('mybutton').addEventListener('mouseout', () => {
            console.log('마우스가 내려갔어요')
        })
        document.getElementById('mybutton').addEventListener('mousemove', (ev) => {
            console.log(`마우스 정보: ${event.clientX}`)
        })
    </script>
</body>
</html>
