<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            border: 1px, solid, black;
            padding: 10px;
        }
    </style>
</head>

<body>
    <table id="table1">
        <tr>
            <td>셀1</td>
            <td>셀2</td>
            <td>셀3</td>
        </tr>
        <tr>
            <td>셀4</td>
            <td>셀5</td>
            <td>셀6</td>
        </tr>
        <tr>
            <td>셀7</td>
            <td>셀8</td>
            <td>셀9</td>
        </tr>
    </table>
    <hr>
    <table id="table2">
        <tr>
            <td>셀1</td>
            <td>셀2</td>
            <td>셀3</td>
        </tr>
        <tr>
            <td>셀4</td>
            <td>셀5</td>
            <td>셀6</td>
        </tr>
        <tr>
            <td>셀7</td>
            <td>셀8</td>
            <td>셀9</td>
        </tr>
    </table>
    
    <button onclick="changeOddCells()">홀수셀 색상 변경</button>
    <button onclick="changeEvenCells()">짝수셀 색상 변경</button>

    <script>
        function changeOddCells() {
            const table1 = document.getElementById('table1')
            const cells = table1.getElementsByTagName('td')
            for (let i = 0; i < cells.length; i++) {
                if (i % 2 == 0) {
                    cells[i].style.backgroundColor = 'lightblue'
                }
            }
        }
        
        function changeEvenCells() {
            // const cells = document.getElementById('table2').getElementsByTagName('td')
            const cells = document.querySelectorAll('#table2 td') //CSS셀렉터 형태로 내가 원하는 걸 선택할 수 있음
            console.log(cells)
            // Array.from(cells).forEach((cell, index) => {
            cells.forEach((cell, index) => {
                if (index % 2 == 1) {
                    cell.style.backgroundColor = 'lightblue'
                }
            });
        }
    </script>
</body>

</html>
