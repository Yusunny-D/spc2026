<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            border: 1px, solid, black;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>셀1</td>
            <td>셀2</td>
            <td>셀3</td>
        </tr>
        <tr>
            <td>셀4</td>
            <td>셀5</td>
            <td>셀6</td>
        </tr>
        <tr>
            <td>셀7</td>
            <td>셀8</td>
            <td>셀9</td>
        </tr>
    </table>

    <button onclick="changeOddCells()">홀수셀 색상 변경</button>
    <button onclick="changeEvenCells()">짝수셀 색상 변경</button>

    <script>
        function changeOddCells() {
            const cells = document.getElementsByTagName('td')
            // console.log(cells)
            for (let i = 0; i < cells.length; i++) {
                if (i % 2 == 0) {
                    // console.log(cells[i]);
                    cells[i].style.backgroundColor = 'lightblue'
                }
            }
        }

        function changeEvenCells() {
            const cells = document.getElementsByTagName('td')
            // cells가 HTMLCollections라서 일단 Array로 변환하기
            Array.from(cells).forEach((cell, index) => {
                if (index % 2 == 1) {
                    cell.style.backgroundColor = 'lightblue'
                }
                // console.log(cell)
            });
        }
    </script>
</body>

</html>
