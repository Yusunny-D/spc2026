<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mydiv {
            width: 200px;
            height: 200px;
            background-color: lightsalmon;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Show / Hide</h1>
    <button onclick="showhide_fix2()">숨겨진 요소 토글</button>
    <div id="mydiv">이것은 숨겨진 div요소입니다.</div>
    <script>
        function showhide_with_bug() {
            // 문제의 원인은 DOM
            const div = document.getElementById('mydiv')
            if (div.style.display == 'none') {
                div.style.display = 'block'
            } else {div.style.display = 'none'}
        }
        function showhide_fix1() {
            const div = document.getElementById('mydiv')
            if (div.style.display == 'block') {
                div.style.display = 'none'
            } else {div.style.display = 'block'}
        }
        function showhide_fix2() {
            // 실제 style까지 적용된 결과로
            const div = document.getElementById('mydiv')
            const displayStyle = window.getComputedStyle(div).display; //연산된 결과를 가져옴(css가 적용된 현재 값)
            if (displayStyle == 'none') {
                div.style.display = 'block'
            } else {div.style.display = 'none'}
        }
    </script>
</body>
</html>
