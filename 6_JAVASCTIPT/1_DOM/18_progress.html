<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #progressBar {
            width: 100%;
            background-color: rgb(219, 254, 128);
        }
        #progress {
            width: 0%;
            height: 30px;
            background-color: rgb(255, 213, 0);
        }

        #progressText {
            text-align: center;
            position: absolute;
            width: 100%;
            color: black;
        }
    </style>
</head>
<body>
    <h1>프로그래스바</h1>
    <input type="number" id="timeInput" placeholder="초를 입력하세요." min="1">
    <button onclick="startProgress()" id="startButton">시작</button>
    <button onclick="clearProgress()">초기화</button>
    <div id="progressBar">
        <div id="progress"><span id="progressText">0%</span></div>
    </div>
    <script>
        let timerID;
        let interval;
        const timeInput = document.getElementById('timeInput')
        const progress = document.getElementById('progress')
        const progressText = document.getElementById('progressText')
        const startButton = document.getElementById('startButton')
        

        function startProgress() {
            duration = parseInt(timeInput.value);
            console.log('입력초', duration)
            startButton.disabled = true;

            let elapsed = 0; //초과 시간
            timerID = setInterval(() => {
                // console.log('반복호출');
                elapsed++;
                const ratio = Math.floor((elapsed/duration)*100); // 진행용 계산
                progress.style.width = `${ratio}%`; // ratio+%
                progressText.textContent = `${ratio}%`;

                if (ratio >= 100) {
                    // 타이머 중지
                    clearInterval(timerID)
                    startButton.disabled = false;

                }
            }, 1000);
        }

        function clearProgress() {
            if (timerID) {clearInterval(timerID)};
            progress.style.width = '2px' // 살짝 보이게
            timeInput.value = "";
            progressText.textContent = '0%';
            startButton.disabled = false;
        }
    </script>
</body>
</html>
