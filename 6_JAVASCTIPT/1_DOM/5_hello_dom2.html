<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>나의 헤딩</h1>
    <p>여기는 나의 문장이 있는 곳</p>
    <div id="output"> <!-- 여기가 동적으로 컨텐츠를 채울 곳--></div>
    <p class="text">여기는 나의 두번째 문장이 있는 곳</p>
    <button onclick="sayhello4()">여기는 나의 버튼</button>
    <script>
        function sayhello() {
            console.log("sayhello")
            const myoutput = document.getElementById('output');
            // myoutput.write('글자 써보기')
            console.log(myoutput);
            myoutput.textContent='나의 새로운 동적 문장'
        }
        function sayhello2() {
            // getElementsByTagName 복수형임을 기억할 것
            // 복수형은 리스티가 반환됨 (전문용어로 HTML Collection)
            console.log("sayhello")
            const myoutput = document.getElementsByTagName('div');
            // myoutput.write('글자 써보기')
            console.log(myoutput[0]);
            myoutput[0].textContent='나의 새로운 동적 문장2'
        }
        function sayhello3() {
            console.log("sayhello")
            const myoutput = document.getElementsByTagName('p');
            console.log(myoutput[0]); // 해당 DOM들의 (즉 해당 p들의) 첫번째 멤버
            console.log(myoutput[1]); // 첫번째 멤버/요소
            myoutput[1].textContent='나의 새로운 동적 문장2'
        }
        function sayhello4() {
            console.log("sayhello")
            const myoutput = document.getElementsByClassName('text');
            console.log('myoutput');
            console.log(myoutput[0]); // 해당 DOM들의 (즉 해당 class들의) 첫번째 멤버
            console.log(myoutput[1]); // 첫번째 멤버/요소 (현재 없음)
            myoutput[0].textContent='나의 새로운 동적 문장2'
        }
    </script>
</body>
</html>
