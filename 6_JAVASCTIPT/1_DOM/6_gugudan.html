<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gugudan</title>
</head>
<body>
    <h1>구구단 출력기</h1>
    <input type="text" placeholder="단을 입력하세요(예: 2)" id="input">
    <button onclick="printGugudan()">출력하기</button>
    <div id="result">
        <!-- 결과가 출력될 곳 -->
    </div>

    <script>
        function printGugudan() {
            //=================
            //입력값 가져오기
            //=================
            // console.log('ok')
            const userinput = document.getElementById('input'); // 이건 DOM이 반환됨
            const userinputValue = userinput.value;

            // const userValue = document.getElementById('input').value;

            console.log(userinputValue)
            // console.log(userValue)

            const userinputValueNumber = parseInt(userinputValue)

            //=================
            //입력값 확인하기
            //=================
            //만약 userinputValue가 숫자인지 확인 후 사용자에게 올바르게 입력하라고 알려줌
            if (isNaN(userinputValue)) {
                const result = document.getElementById('result');
                result.innerHTML='<h3>숫자를 입력해주세요.</h3>';
                return;
            }
            
            if (userinputValueNumber <1 || userinputValueNumber >9) {
                const result = document.getElementById('result');
                result.innerHTML='<h3>1~9까지만 입력해주세요.</h3>';
                return;
            }

            //=================
            //출력값 만들기
            //=================
            const result = document.getElementById('result');
            console.log(result)
            // textContent 말 그대로 글자 본문을 입력할 때
            // result.textContent = '<h3>'+ userinputValue+'단</h3>' 
            // innerHTML HTML값을 파싱할 수 있도록 출력
            result.innerHTML = '<h3>'+ userinputValue+'단</h3>' 

            for (let i=1; i<=9; i++) {
                // result.innerHTML += userinputValue + 'x' + i + '=' +userinputValue*i + '<br>'
                result.innerHTML+= `${userinputValue} x ${i} = ${userinputValue*i}<br>`
            }
        }
    </script>
</body>
</html>
