<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"><!-- 응답 대이터를 표시할 곳 --></div>
    <script>
        document.getElementById('loadBtn').addEventListener('click', async () => {
            try {
            const response = await fetch('http://jsonplaceholder.typicode.com/todos/1');
            if (!response.ok) {
                console.log('응답은 왔으나, OK가 아님 ', response)
                throw new Error('알 수 없는 오류가 발생했습니다.')
            }
            console.log('성공적인 응답이 왔음. 응답은 여기 담겨있음: ', response)
            
            const data = await response.json();

            console.log('최종 피싱이 끝난 json 자료구조가 넘어옴: ', data)
            // 이 받아온 데이터로 DOM에 랜더링 한다.
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
            <p>Id: ${data.id}, Title: ${data.title}</p>
                `;
            });
            catch (error) {
                console.log('위에 fetch를 자리 처리하고 가공하는 과정 어딘가에서 오류가 났습니다.', error)
            };
        })
    </script>
</body>
</html>
