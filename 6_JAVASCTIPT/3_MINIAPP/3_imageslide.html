<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
        }

        .slider {
            display: flex;
            flex-direction: column;
            margin: 0 auto; /*상하 좌우*/
            text-align: center;
            max-width: 600px;
            align-items: center;
        }

        .slider img {
            max-width: 100%;
            height: 300px;
            display: none; /*기본 다 숨기기*/
        }

        .slider img.active {
            display: block; /*활성화된 이미지는 표시*/
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>이미지 슬라이더</h1>
    <div class="slider">
        <img id='img1' src="images/images.jpeg" class="active">
        <img id='img2' src="images/s222carp68n7e5wi691u.jpg">
        <img id='img3' src="images/y71cy91bgj367gl7d4ee.jpg">
        <div class="filename" id="filename">images/images.jpeg</div>
        <div class="buttons">
            <button id="prevBtn">이전</button>
            <button id="nextBtn">다음</button>
        </div>
    </div>

    <script>
        // 내 오답.. 오답노트 필요

        // const slider = document.getElementById('slider');
        // const img1 = document.getElementById('img1');
        // const img2 = document.getElementById('img2');
        // const img3 = document.getElementById('img3');
        // const imgs= [img1, img2, img3];
        
        // imgs.forEach((img) => {
        //     img.addEventListener('click', () => {
        //         if (img.className == 'active') {
        //             img.className = ''
        //         } else
        //         {img.className = 'active'}
        //     })
        // });
        
        // // imgs.forEach((img) => {
        // //     img.addEventListener('click', () => {
        // //         img.className = ''
        // //     })
        // // });

        // 강사님 답
        const imgs = document.querySelectorAll('.slider img')
        const prevBtn = document.getElementById('prevBtn')
        const nextBtn = document.getElementById('nextBtn')
        const filename = document.getElementById('filename')

        let idx = 0;

        function show(n) {
            imgs[idx].classList.remove('active');
            
            filename.textContent = imgs[idx].src.split('/').slice(-2).join('/');
            
            if (idx + 1 >= imgs.length) {
                nextBtn.disabled = true
            } else {nextBtn.disabled = false}
            if (idx -1 < 0) {
                prevBtn.disabled = true
            } else {prevBtn.disabled = false}
            idx += n;
            imgs[idx].classList.add('active');
        }

        nextBtn.addEventListener('click', () => {show(1)});
        prevBtn.addEventListener('click', () => {show(-1)});



    </script>
</body>
</html>
