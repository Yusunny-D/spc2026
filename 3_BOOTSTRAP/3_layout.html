<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <h1>안녕하세요.</h1>
    <h1 class="mx-2">안녕하세요.(mx-2)</h1>
    <h1 class="mx-3">안녕하세요.(mx-3)</h1>
    <h1 class="mx-4">안녕하세요.(mx-4)</h1>
    <h1 class="mx-5">안녕하세요.(mx-5)</h1>
    <h1 class="my-2">안녕하세요.(my-2)</h1>
    <h1 class="my-5">안녕하세요.(my-5)</h1>
    <h1 class="m-4">안녕하세요.(m-4)</h1>
    <!-- m: margin, p: padding, t: top, b: bottom, S: start(왼쪽), e: end(오른쪽)
    숫자값은 0-5까지 있음 -->
</body>
</html>
