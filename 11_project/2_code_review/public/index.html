<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 취약점 분석기</title>
</head>
<body>
    <h1>코드 취약점 분석기</h1>
    <form id="codeForm">
        <textarea name="code" id="code" rows="1" cols="60" placeholder="깃허브 주소를 입력하세요."></textarea><br>
        <button type="submit">분석시작</button>
    </form>
    <h2>분석 결과</h2>
    <pre id="result"></pre>
    <script src="public/js/script.js"></script>
</body>
</html>
