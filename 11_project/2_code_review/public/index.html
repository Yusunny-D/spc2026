<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드 취약점 분석기</title>
</head>
<body>
    <h1>코드 취약점 분석기</h1>
    <form id="codeForm">
        <textarea name="codeUrl" id="codeUrl" rows="1" cols="60" placeholder="깃허브 주소를 입력하세요."></textarea><br>
        <h2>분석할 취햑점 유형 선택(복수 선택 가능)</h2>
        <label><input type="checkbox" id="hardcoding">민감정보(하드코딩된 암호)</label>
        <label><input type="checkbox" id="sql">SQL Injection</label>
        <label><input type="checkbox" id="xss">XSS</label>
        <br>
        <button type="submit">check</button>
    </form>
    <h2>분석 결과</h2>
    <pre id="result"></pre>
    <script src="public/script.js"></script>
</body>
</html>
