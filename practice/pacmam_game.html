<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="400" height="300"></canvas>
    <script>
        const canvas = document.getElementById('myCanvas')
        const context = canvas.getContext('2d')

        let pacmanX = 200;
        let pacmanY = 150;
        let speed = 1;

        function pacman() {
            // 원 그리기 시작
            context.clearRect(0, 0, canvas.width, canvas.height)
            context.beginPath();
            context.moveTo(pacmanX, pacmanY);

            let startAngle = 0.18*Math.PI;
            let endAngle = 2*Math.PI - 0.18*Math.PI;
            context.arc(pacmanX, pacmanY, 50, startAngle, endAngle)
            context.lineTo(pacmanX, pacmanY);

            context.fillStyle = 'yellow'
            context.fill();

            context.stroke();
            context.closePath();
            // 원 그리기 끝


        }

        pacman();
        
        // ArrowUp
        // ArrowDown
        // ArrowLeft
        // ArrowRight
        document.addEventListener('keydown', (ev) => {
            if (ev.key == 'ArrowUp') {
                pacmanY -= speed;
                requestAnimationFrame(pacman)
            }
        })

    </script>
    
</body>
</html>
