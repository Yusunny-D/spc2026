<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body{
            height: 2000px; /*강제 스크롤을 위한 공간 확보*/
            padding: 50px;
        }

        .box{
            margin: 100px 0;
            padding: 40px;
            background: #ffc7c7;
            border: 2px solid pink;
            text-align: center;
            font-size: 24px;

        }
    </style>
</head>
<body>
    <h1>스크롤 하면서 등장하는 요소들</h1>
    <div class="box" data-aos="fade-up">첫번째 박스</div>
    <div class="box" data-aos="fade-out">두번째 박스</div>
    <div class="box" data-aos="zoom-in">세번째 박스</div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
    AOS.init();
    </script>
</body>
</html>
